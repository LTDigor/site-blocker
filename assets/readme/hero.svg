<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="400" viewBox="0 0 1200 400"
     role="img" aria-labelledby="title desc">
  <title id="title">Site Blocker</title>
  <desc id="desc">Расширение браузера, которое блокирует выбранные сайты и URL-пути, оставляя доступ только после осознанного решения.</desc>

  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" rx="28" fill="#0f172a"/>
  <path d="M0 318 C248 262 392 372 620 318 C860 260 1015 305 1200 230 V400 H0 Z"
        fill="#172554" opacity=".46"/>

  <g id="title-block" transform="translate(64 62)">
    <text x="0" y="0" fill="#93c5fd"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="20" font-weight="700" letter-spacing="2">РАСШИРЕНИЕ ДЛЯ БРАУЗЕРА</text>
    <text x="0" y="92" fill="#f8fafc"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="76" font-weight="800">Site Blocker</text>
    <text x="0" y="148" fill="#cbd5e1"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="30" font-weight="500">Блокируйте сайты и URL-пути.</text>
    <text x="0" y="188" fill="#cbd5e1"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="30" font-weight="500">Возвращайте доступ осознанно.</text>

    <g transform="translate(0 238)"
       font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
       font-size="20" font-weight="650">
      <rect width="184" height="48" rx="24" fill="#1e3a8a"/>
      <text x="92" y="31" text-anchor="middle" fill="#dbeafe">ДОМЕНЫ</text>
      <rect x="198" width="184" height="48" rx="24" fill="#1e3a8a"/>
      <text x="290" y="31" text-anchor="middle" fill="#dbeafe">URL-ПУТИ</text>
      <rect x="396" width="184" height="48" rx="24" fill="#1e3a8a"/>
      <text x="488" y="31" text-anchor="middle" fill="#dbeafe">REGEX</text>
    </g>
  </g>

  <g id="project-proof" transform="translate(756 48)">
    <rect width="380" height="304" rx="24" fill="#f8fafc"/>
    <rect x="20" y="20" width="340" height="54" rx="14" fill="#e2e8f0"/>
    <circle cx="44" cy="47" r="7" fill="#f87171"/>
    <circle cx="68" cy="47" r="7" fill="#fbbf24"/>
    <circle cx="92" cy="47" r="7" fill="#22c55e"/>
    <text x="120" y="54" fill="#475569"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="18">example.com/news</text>

    <g transform="translate(30 98)"
       font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
       font-size="18" font-weight="650">
      <rect width="214" height="46" rx="12" fill="#dbeafe"/>
      <text x="18" y="29" fill="#1e3a8a">example.com</text>
      <rect y="58" width="250" height="46" rx="12" fill="#dbeafe"/>
      <text x="18" y="87" fill="#1e3a8a">example.com/news</text>
      <rect y="116" width="236" height="46" rx="12" fill="#dbeafe"/>
      <text x="18" y="145" fill="#1e3a8a">example.com/^$</text>
    </g>

    <path d="M282 178 H310" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
    <path d="M302 168 L314 178 L302 188" fill="none" stroke="#2563eb"
          stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(306 122)">
      <path d="M25 0 L50 10 V35 C50 55 39 70 25 78 C11 70 0 55 0 35 V10 Z"
            fill="url(#shield)"/>
      <rect x="14" y="29" width="22" height="23" rx="4" fill="#eff6ff"/>
      <path d="M18 29 V22 A7 7 0 0 1 32 22 V29" fill="none" stroke="#eff6ff"
            stroke-width="5" stroke-linecap="round"/>
    </g>

    <text x="190" y="266" text-anchor="middle" fill="#334155"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="22" font-weight="700">Меньше автоматизма.</text>
    <text x="190" y="292" text-anchor="middle" fill="#334155"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="22" font-weight="700">Больше выбора.</text>
  </g>
</svg>
