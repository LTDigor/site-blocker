<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Image Blocker</title>
    <link rel="stylesheet" href="./popup.css">
</head>
<body>

<main class="popup-shell">
    <header class="popup-header">
        <h1>Site Blocker</h1>
    </header>

    <form class="rule-form" id="ruleForm">
        <label class="input-label" for="siteInput">Site or URL</label>
        <div class="input-row">
            <input id="siteInput" placeholder="example.com/news" autocomplete="off">
            <button class="add-button" id="addBtn" type="submit" aria-label="Add blocked site" title="Add blocked site">+</button>
        </div>
        <button class="current-site-button" id="currentSiteBtn" type="button">
            Add current site
        </button>
        <p class="hint" id="formHint">Use a domain, path prefix, or regex path.</p>
    </form>

    <section class="current-block-section is-hidden" id="currentBlockSection" aria-label="Current blocked site">
        <div class="section-header">
            <h2>Current blocked site</h2>
        </div>
        <div class="current-block-content">
            <span class="rule-text" id="currentBlockSite"></span>
            <span class="rule-status" id="currentBlockStatus"></span>
            <button class="unblock-button" id="currentUnblockBtn" type="button">Unblock 10 min</button>
        </div>
    </section>

    <section class="rules-section is-collapsed" id="rulesSection" aria-label="Blocked sites">
        <button class="section-header section-toggle" id="rulesToggle" type="button" aria-expanded="false" aria-controls="rulesContent">
            <h2>Blocked sites</h2>
            <span class="section-meta">
                <span class="counter" id="counter">0</span>
                <span class="expand-icon" aria-hidden="true">›</span>
            </span>
        </button>

        <div class="rules-content" id="rulesContent" hidden>
            <p class="empty-state" id="emptyState">No blocked sites yet.</p>
            <ul class="rules-list" id="list"></ul>
        </div>
    </section>

    <section class="image-section" aria-label="Blocked page image">
        <div class="section-header">
            <h2>Block image</h2>
            <span class="image-state" id="imageState">Default</span>
        </div>

        <div class="image-controls">
            <label class="image-picker" for="imageInput">
                Choose local image
            </label>
            <input id="imageInput" type="file" accept="image/*">
            <button class="reset-image-button" id="resetImageBtn" type="button">
                Reset
            </button>
        </div>
        <p class="hint" id="imageHint">Image files up to 4 MB.</p>
    </section>
</main>

<dialog class="confirm-dialog" id="unblockDialog">
    <form class="confirm-panel" method="dialog">
        <img class="confirm-image" id="unblockPreview" alt="Blocked">
        <h2>Are you sure you want to unblock?</h2>
        <p class="confirm-copy" id="unblockDialogText">This site will be available for 10 minutes.</p>
        <label class="math-challenge" for="unblockChallengeAnswer">
            <span id="unblockChallengeQuestion">Solve: 1 + 1 =</span>
            <input id="unblockChallengeAnswer" type="number" inputmode="numeric" autocomplete="off">
        </label>
        <p class="challenge-hint" id="unblockChallengeHint"></p>
        <div class="confirm-actions">
            <button class="secondary-button" id="cancelUnblockBtn" type="button">Cancel</button>
            <button class="confirm-button" id="confirmUnblockBtn" type="button">Unblock 10 min</button>
        </div>
    </form>
</dialog>

<script type="module" src="./popup.js"></script>

</body>
</html>
