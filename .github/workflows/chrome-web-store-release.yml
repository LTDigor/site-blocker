name: Chrome Web Store Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Package and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: npm test

      - name: Validate release version
        run: |
          node --input-type=module <<'NODE'
          import { readFile } from "node:fs/promises";

          const tag = process.env.GITHUB_REF_NAME || "";
          const packageJson = JSON.parse(await readFile("package.json", "utf8"));
          const manifest = JSON.parse(await readFile("manifest.json", "utf8"));

          if (!tag) throw new Error("Missing release tag.");
          if (!tag.startsWith("v")) throw new Error(`Release tag must start with "v": ${tag}`);

          const tagVersion = tag.slice(1);

          if (!/^\d+\.\d+\.\d+$/.test(tagVersion)) {
            throw new Error(`Release tag must use SemVer format like v1.2.0: ${tag}`);
          }

          if (packageJson.version !== tagVersion) {
            throw new Error(`package.json version ${packageJson.version} does not match tag ${tag}.`);
          }

          if (manifest.version !== tagVersion) {
            throw new Error(`manifest.json version ${manifest.version} does not match tag ${tag}.`);
          }

          console.log(`Release version validated: ${tagVersion}`);
          NODE

      - name: Package extension
        run: |
          node --input-type=module <<'NODE'
          import { cpSync, existsSync, mkdirSync, readdirSync, rmSync, statSync, utimesSync } from "node:fs";
          import { readFile, writeFile } from "node:fs/promises";
          import { join } from "node:path";
          import { spawnSync } from "node:child_process";

          const root = process.cwd();
          const packageJson = JSON.parse(await readFile(join(root, "package.json"), "utf8"));
          const baseManifest = JSON.parse(await readFile(join(root, "manifest.json"), "utf8"));
          const version = packageJson.version;
          const stagingRoot = join(root, ".extension-package");
          const distDir = join(root, "dist");
          const fixedTimestamp = new Date("2000-01-01T00:00:00Z");
          const entries = ["manifest.json", "src", "assets"];
          const localOnlyEntries = ["assets/images/local-image.jpg"];
          const targets = [
            { name: "chromium", manifest: createChromiumManifest(baseManifest) },
            { name: "firefox", manifest: createFirefoxManifest(baseManifest) }
          ];

          rmSync(stagingRoot, { recursive: true, force: true });
          mkdirSync(distDir, { recursive: true });

          for (const target of targets) {
            const stagingDir = join(stagingRoot, target.name);
            const zipPath = join(distDir, `site-blocker-${target.name}-v${version}.zip`);

            mkdirSync(stagingDir, { recursive: true });
            rmSync(zipPath, { force: true });

            for (const entry of entries) {
              if (entry === "manifest.json") continue;

              const source = join(root, entry);
              if (!existsSync(source)) throw new Error(`Missing package entry: ${entry}`);

              cpSync(source, join(stagingDir, entry), {
                recursive: true,
                preserveTimestamps: false
              });
            }

            for (const entry of localOnlyEntries) {
              rmSync(join(stagingDir, entry), { force: true });
            }

            await writeFile(
              join(stagingDir, "manifest.json"),
              `${JSON.stringify(target.manifest, null, 2)}\n`
            );

            touchTree(stagingDir);

            const result = spawnSync("zip", ["-X", "-q", "-r", zipPath, ...entries], {
              cwd: stagingDir,
              stdio: "inherit"
            });

            if (result.error) throw result.error;
            if (result.status !== 0) throw new Error(`zip exited with status ${result.status}`);

            console.log(`Created ${zipPath}`);
          }

          rmSync(stagingRoot, { recursive: true, force: true });

          function createChromiumManifest(manifest) {
            return {
              ...manifest,
              background: {
                service_worker: manifest.background.service_worker,
                type: "module"
              }
            };
          }

          function createFirefoxManifest(manifest) {
            return {
              ...manifest,
              background: {
                scripts: [manifest.background.service_worker],
                type: "module",
                preferred_environment: ["document"]
              }
            };
          }

          function touchTree(path) {
            const stats = statSync(path);

            if (stats.isDirectory()) {
              for (const child of readdirSync(path).sort()) {
                touchTree(join(path, child));
              }
            }

            utimesSync(path, fixedTimestamp, fixedTimestamp);
          }
          NODE

      - name: Resolve package path
        id: package
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          PACKAGE_PATH="dist/site-blocker-chromium-v${VERSION}.zip"
          test -f "$PACKAGE_PATH"
          echo "path=$PACKAGE_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-package
          path: ${{ steps.package.outputs.path }}
          if-no-files-found: error

      - name: Validate Chrome Web Store secrets
        env:
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_SERVICE_ACCOUNT_JSON: ${{ secrets.CWS_SERVICE_ACCOUNT_JSON }}
        run: |
          test -n "$CWS_PUBLISHER_ID"
          test -n "$CWS_EXTENSION_ID"
          test -n "$CWS_SERVICE_ACCOUNT_JSON"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.CWS_SERVICE_ACCOUNT_JSON }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore

      - name: Upload to Chrome Web Store
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          PACKAGE_PATH: ${{ steps.package.outputs.path }}
        run: |
          curl --fail-with-body \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -X POST \
            -T "${PACKAGE_PATH}" \
            "https://chromewebstore.googleapis.com/upload/v2/publishers/${CWS_PUBLISHER_ID}/items/${CWS_EXTENSION_ID}:upload"

      - name: Publish to Chrome Web Store
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          curl --fail-with-body \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -X POST \
            "https://chromewebstore.googleapis.com/v2/publishers/${CWS_PUBLISHER_ID}/items/${CWS_EXTENSION_ID}:publish"
